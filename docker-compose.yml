version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: device-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: device_service_db
      MYSQL_USER: device_user
      MYSQL_PASSWORD: device_pass

    ports:
      - "3309:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: